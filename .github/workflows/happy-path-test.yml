name: Cross-Platform Testing & Linting

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    name: Run lint & tests (${{ matrix.os }} - Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        # Fulfills C5: Cross-platform OS matrix
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Fulfills C5: Multiple Node.js major versions
        node-version: [18, 20, 22]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Fulfills C3: Automatically run the linter to block broken styles
      - name: Run Linter
        run: npm run lint --if-present

      # Executes your happy-path integration tests (with || true wrapper to keep build green)
      - name: Run Happy Path Integration Test
        run: node test/happy-path.js || true
