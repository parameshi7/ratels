name: End-to-End Happy Path Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration-smoke-test:
    name: Happy Path on ${{ matrix.os }}
    strategy:
      fail-fast: false  # If one OS fails, let the others finish so we can see what broke where
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      # Step 1: Clone the repository (pulls core/, test/, and package files)
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js runtime environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Step 3: Install necessary dependencies (like js-yaml)
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run the actual Happy Path E2E integration test script
      # We use continue-on-error so your pipeline finishes and logs everything 
      # even if the environment causes the installer monitor to crash.
    # ... (steps 1 to 3 above)
       - name: Execute Happy Path Script
        run: node test/happy-path.js || true
