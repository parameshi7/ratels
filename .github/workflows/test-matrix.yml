name: Cross-Platform Test Matrix

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-collectors:
    name: Test on ${{ matrix.os }} (Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Automatically runs sanity checks on your core modules
      - name: Run Snapshot Sanity Checks
        run: |
          node core/OsDetection.js
          node core/PackageManagerDetection.js
          node core/BeforeSnapshot.js
          node core/AfterSnapshot.js
