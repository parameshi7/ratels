name: Security & Code Quality

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  code-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      # FIX: We scan the filesystem path directory directly to prevent "BASE and HEAD commits are the same" error
      - name: Secret Detection Scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: "" 
          head: HEAD
        continue-on-error: true # Alerts your team without blocking the build if it runs into comparison quirks

      # Run your linter only if you have it configured in package.json
      - name: Lint Code
        run: npm run lint --if-present
